# Liste des Cloud Builders : https://console.cloud.google.com/gcr/images/cloud-builders/GLOBAL
options:
  automapSubstitutions: true

substitutions:
  _GITHUB_REPOSITORY: "Nadirici/mlops_api.git"

steps:
  - name: "ghcr.io/astral-sh/uv:python3.12-trixie-slim"
    id: CI
    entrypoint: /bin/sh
    args:
      - "-c"
      - "chmod a+x install.sh && ./install.sh && uv sync && uv run pytest ."
    env:
      - "UV_CACHE_DIR=/root/.cache/uv"

  - name: "ghcr.io/astral-sh/uv:python3.12-trixie-slim"
    id: CD
    entrypoint: /bin/bash
    args:
      - "-c"
      - "chmod a+x install.sh && ./install.sh && uv run kedro run"
    env:
      - "ENV=$BRANCH_NAME"
      - "MLFLOW_SERVER=$_MLFLOW_SERVER"
      - "DO_NOT_TRACK=1"
      - "UV_CACHE_DIR=/root/.cache/uv"
    waitFor: ["CI"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: API Deploy
    secretEnv: ["GITHUB_TOKEN"]
    entrypoint: "bash"
    args:
      - "-c"
      - |
        git clone --branch $BRANCH_NAME https://$$GITHUB_TOKEN@github.com/$_GITHUB_REPOSITORY /tmp/purchase_predict_api
        cd /tmp/purchase_predict_api
        gcloud builds submit \
          --config /tmp/purchase_predict_api/cloudbuild.yaml /tmp/purchase_predict_api \
          --substitutions=SHORT_SHA=$SHORT_SHA
    waitFor: ["CD"]

logs_bucket: "gs://tp_mlops_nadir"
timeout: 1200s

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/purchase-predict-github-oauthtoken-b624a1/versions/latest
      env: GITHUB_TOKEN
    